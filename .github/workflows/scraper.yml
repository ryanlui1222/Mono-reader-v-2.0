name: Auto Culture Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時執行一次 (UTC 時間)
  workflow_dispatch:       # 允許你在 GitHub 網頁上手動點擊 "Run workflow" 按鈕測試

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼 (Checkout Repo)
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 依據你的開發環境選擇版本

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        # 確保專案根目錄有 requirements.txt，裡面需包含 pandas, bs4, feedparser, cloudscraper 等
        pip install -r requirements.txt

    - name: 執行爬蟲腳本
      run: |
        python crawler.py

    - name: 將最新的 data.json 推送回倉庫
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.json
        # 如果資料有變動才進行 commit 與 push
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.json" && git push)

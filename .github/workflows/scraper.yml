name: Auto Culture Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時執行一次
  workflow_dispatch:       # 允許手動執行測試

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼 (Checkout Repo)
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行爬蟲腳本並同步雲端
      # 🌟 關鍵修正：使用 env 區塊將鑰匙從 GitHub 保險箱傳遞給 Python 程式
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python crawler.py

    # 🌟 結構優化：已移除 git-auto-commit-action 
    # 因為我們現在直接同步到 Supabase，不再需要把 json 檔推回 GitHub 了

name: Auto Culture Crawler

on:
  workflow_dispatch:       # 🎯 唯一啟用的觸發條件：僅允許在 GitHub 網頁上手動點擊執行

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼 (Checkout Repo)
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行爬蟲腳本並同步雲端 (DEV 環境)
      env:
        # 🎯 完美綁定：Python 認得左邊的名字，GitHub 負責把測試庫的金鑰從右邊塞進去
        TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL_DEV }}
        TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN_DEV }}
      run: |
        python crawler.py

    # 🌟 結構優化：已移除 git-auto-commit-action 
    # 因為我們現在直接同步到 Turso，不再需要把 json 檔推回 GitHub 了

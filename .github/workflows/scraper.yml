name: Auto Culture Crawler

#on:
  #schedule:
    #- cron: '0 */6 * * *'  # 每 6 小時執行一次
  workflow_dispatch:       # 允許手動執行測試

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼 (Checkout Repo)
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行爬蟲腳本並同步雲端
      env:
        # 🌟 修正：將環境變數名稱與 GitHub Secrets 名稱改為 TURSO
        TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      run: |
        python crawler.py

    # 🌟 結構優化：已移除 git-auto-commit-action 
    # 因為我們現在直接同步到 Turso，不再需要把 json 檔推回 GitHub 了

name: Auto Culture Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時執行一次 (UTC 時間)
  workflow_dispatch:       # 允許你在 GitHub 網頁上手動點擊 "Run workflow" 按鈕測試

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    # 🌟 防呆機制：強制賦予這個機器人寫入程式碼的權限
    permissions:
      contents: write

    steps:
    - name: 檢出程式碼 (Checkout Repo)
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 依據你的開發環境選擇版本

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行爬蟲腳本
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python crawler.py

    # 🌟 終極解法：使用這個強大的 Action 來取代手動 git push
    - name: 將最新的 data.json 自動推送回倉庫
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update data.json"
        file_pattern: "data.json"

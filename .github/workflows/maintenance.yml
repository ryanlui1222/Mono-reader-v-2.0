name: Weekly Database Cleanup

on:
  schedule:
    - cron: '0 0 * * 0'  # 🌟 每週日凌晨 00:00 (UTC) 定時執行大掃除
  workflow_dispatch:       # 允許在 GitHub 網頁上手動點擊按鈕測試

jobs:
  run-cleanup:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install libsql-client  # 🌟 修正：改為安裝 Turso 的套件

    - name: 執行資料庫大掃除
      env:
        # 🌟 修正：將環境變數名稱與 GitHub Secrets 名稱改為 TURSO
        TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      run: |
        python maintenance.py

name: 🗄️ Monthly Database Backup

on:
  schedule:
    # 這是 Cron 語法，代表每個月的 1 號凌晨 00:00 (UTC 時間) 執行
    - cron: '0 0 1 * *'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊執行測試

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安裝相依套件
        run: |
          pip install pandas libsql-client

      - name: 💾 執行資料庫備份腳本
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          python backup_db.py

      - name: 📤 上傳備份檔案至 GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monoreader-db-backup-${{ github.run_id }}
          path: backup_*/
          retention-days: 90 # 備份檔案會在 GitHub 上保留 90 天供您下載

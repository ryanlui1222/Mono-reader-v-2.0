name: 🎓 Biblioapp Crawler Sync

on:
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v3

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 libsql-client cloudscraper
          
      - name: 🚀 執行 Biblioapp 學術文獻爬蟲
        env:
          # 將 GitHub Secrets 注入為環境變數，讓爬蟲腳本讀取
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL_DEV }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN_DEV }}
        run: |
          python scholar_crawler.py
